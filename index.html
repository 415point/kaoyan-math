.header h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
.header .target { font-size: 13px; opacity: .85; }
.header .target strong { color: #fbbf24; font-size: 16px; }

/* Tabs */
.tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid var(--border); padding: 0 24px; position: sticky; top: 56px; z-index: 99; justify-content: center; }
.tab { padding: 14px 24px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #1e293b; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab .badge { display: inline-block; background: var(--primary-light); color: var(--primary); font-size: 11px; padding: 1px 7px; border-radius: 10px; margin-left: 6px; font-weight: 600; }

/* Main */
.main { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.card h3 { font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card { background: rgba(255,255,255,.2); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; text-align: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

.stat-card .label { font-size: 13px; color: rgba(255,255,255,.9); margin-top: 4px; text-shadow: 0 1px 3px rgba(0,0,0,.2); }

/* Progress Bars */
.progress-section { margin-bottom: 24px; }
.progress-section h4 { font-size: 14px; margin-bottom: 12px; color: var(--text-secondary); }
.progress-bar-wrap { background: #f1f5f9; border-radius: 6px; height: 10px; margin-bottom: 8px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 6px; transition: width .5s ease; }
.progress-bar-fill.high { background: var(--primary); }
.progress-bar-fill.mid { background: var(--warning); }
.progress-bar-fill.low { background: var(--danger); }
.progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }

/* Tree */
.tree { user-select: none; }

.tree-node .row:hover { background: #f8fafc; }
.tree-node .arrow { width: 18px; text-align: center; font-size: 10px; color: var(--text-secondary); transition: transform .2s; flex-shrink: 0; }
.tree-node .arrow.open { transform: rotate(90deg); }
.tree-node .name { flex: 1; font-size: 14px; }
.tree-node .name.section { font-weight: 600; }
.tree-node .name.chapter { font-weight: 600; color: var(--primary); font-size: 15px; }
.tree-node .children { margin-left: 24px; display: none; }
.tree-node .children.open { display: block; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.status-dot.learning { background: #fbbf24; }

.status-select { font-size: 12px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; background: #fff; flex-shrink: 0; }

.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Forms */
input, textarea, select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; transition: border-color .2s; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }

/* Pace indicator */

.pace-track { flex: 1; height: 8px; background: #f1f5f9; border-radius: 4px; position: relative; }
.pace-fill { height: 100%; border-radius: 4px; }
.pace-marker { position: absolute; top: -4px; width: 2px; height: 16px; background: var(--text); border-radius: 1px; }

/* Chapter progress list */
.chapter-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; }
.chapter-item { background: #f8fafc; border-radius: 8px; padding: 14px; display: flex; align-items: center; gap: 12px; }

// ===========================
// LOCK SCREEN (password gate)
// ===========================
const LOCK_KEY = 'kaoyan_lock_v1';
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000;

function getLockData() {
  try { return JSON.parse(localStorage.getItem(LOCK_KEY)) || {}; } catch(e) { return {}; }
}
function saveLockData(d) { localStorage.setItem(LOCK_KEY, JSON.stringify(d)); }

async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin + 'kaoyan-salt');
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function renderLockScreen(isSetup, msg) {
  const title = isSetup ? '设置访问密码' : '思明南路的路途';
  const sub = isSetup ? '首次使用，请设置一个4-8位数字密码' : '请输入密码解锁';
  const btn = isSetup ? '设置密码' : '解锁';
  const overlay = document.createElement('div');
  overlay.className = 'lock-overlay';
  overlay.id = 'lock-overlay';
  overlay.innerHTML = `<div class="lock-card">
    <div class="lock-icon">🔐</div>
    <h2>${title}</h2>
    <div class="sub">${sub}</div>
    <input type="password" id="lock-pin" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="输入数字密码" autofocus>
    <div class="lock-msg" id="lock-msg">${msg||''}</div>
    <button class="lock-btn" id="lock-btn">${btn}</button>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('lock-btn').addEventListener('click', () => handleLockSubmit(isSetup));
  document.getElementById('lock-pin').addEventListener('keydown', (e) => { if(e.key==='Enter') handleLockSubmit(isSetup); });
}

async function handleLockSubmit(isSetup) {
  const pin = document.getElementById('lock-pin').value.trim();
  const msgEl = document.getElementById('lock-msg');
  const btn = document.getElementById('lock-btn');

  if (!pin || pin.length < 4 || !/^\d+$/.test(pin)) {
    msgEl.textContent = '请输入4-8位数字密码';
    return;
  }

  const lockData = getLockData();

  // Check lockout
  if (lockData.lockUntil && Date.now() < lockData.lockUntil) {
    const remain = Math.ceil((lockData.lockUntil - Date.now()) / 60000);
    msgEl.textContent = `密码错误次数过多，请${remain}分钟后再试`;
    return;
  }

  const hash = await hashPin(pin);

  if (isSetup) {
    lockData.hash = hash;
    lockData.attempts = 0;
    saveLockData(lockData);
    document.getElementById('lock-overlay').remove();
  } else {
    if (hash === lockData.hash) {
      lockData.attempts = 0;
      saveLockData(lockData);
      document.getElementById('lock-overlay').remove();
    } else {
      lockData.attempts = (lockData.attempts || 0) + 1;
      const remaining = MAX_ATTEMPTS - lockData.attempts;
      if (lockData.attempts >= MAX_ATTEMPTS) {
        lockData.lockUntil = Date.now() + LOCKOUT_MS;
        lockData.attempts = 0;
        saveLockData(lockData);
        msgEl.textContent = '错误次数过多，已锁定5分钟';
        btn.disabled = true;
        setTimeout(() => { btn.disabled = false; msgEl.textContent = ''; }, LOCKOUT_MS);
      } else {
        saveLockData(lockData);
        msgEl.textContent = `密码错误，还剩${remaining}次机会`;
      }
      document.getElementById('lock-pin').value = '';
      document.getElementById('lock-pin').focus();
    }
  }
}

// Check if lock screen is needed
(function checkLock() {
  const lockData = getLockData();
  if (!lockData.hash) {
    renderLockScreen(true);
  } else {
    if (lockData.lockUntil && Date.now() < lockData.lockUntil) {
      const remain = Math.ceil((lockData.lockUntil - Date.now()) / 60000);
      renderLockScreen(false, `已锁定，请${remain}分钟后再试`);
    } else {
      renderLockScreen(false);
    }
  }
})();

const PLAN808_VERSION = 3;

function getDefaults() {
  return {
    pointStatus: {},
    pointStatus808: {},
    wrongQuestions: [],
    dailyRecords: {},
    planSettings: { dailyHours: 4, examDate: '2026-12-20' },
    videoCompleted: {},
    plan808: DEFAULT_PLAN_808,
    plan808Version: PLAN808_VERSION
  };
}

function hasSupabase() {
  return typeof supabase !== 'undefined' && supabase && supabase.from;
}

async function loadState() {
  // 1. Try Supabase cloud (with 3s timeout)
  if (hasSupabase()) {
    try {
      const result = await Promise.race([
        supabase.from('app_data').select('data').eq('id', 'main').single(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 3000))
      ]);
      const { data, error } = result;
      if (!error && data && data.data && Object.keys(data.data).length > 0) {
        const merged = { ...getDefaults(), ...data.data };
        if ((merged.plan808Version || 0) < PLAN808_VERSION) {
          merged.plan808 = DEFAULT_PLAN_808;
          merged.plan808Version = PLAN808_VERSION;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        return merged;
      }
    } catch(e) { console.log('Supabase不可用，使用本地存储'); }
  }
  // 2. Fall back to localStorage
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const local = { ...getDefaults(), ...JSON.parse(raw) };
      if ((local.plan808Version || 0) < PLAN808_VERSION) {
        local.plan808 = DEFAULT_PLAN_808;
        local.plan808Version = PLAN808_VERSION;
      }
      // Migrate to Supabase (fire and forget)
      if (hasSupabase()) {
        supabase.from('app_data').upsert({ id: 'main', data: local, updated_at: new Date().toISOString() }).then(() => {});
      }
      return local;
    } catch(e) {}
  }

  // 3. Use defaults
  return getDefaults();
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (hasSupabase()) {
    supabase.from('app_data').upsert({ id: 'main', data: state, updated_at: new Date().toISOString() }).then(() => {});
  }
}

let state = null;

async function bootApp() {
  state = await loadState();
  saveState(state);
  startApp();
}

// Generate unique IDs for each knowledge point
function pointId(sectionId, chapterId, pointIndex) {
  return chapterId + '-p' + pointIndex;
}

// Flatten all knowledge points into a map
function buildPointMap() {
  const map = {};
  KNOWLEDGE_DATA.forEach(section => {
    section.chapters.forEach(chapter => {
      chapter.points.forEach((point, i) => {
        const id = pointId(section.id, chapter.id, i);
        map[id] = { section: section.name, sectionId: section.id, chapter: chapter.name, chapterId: chapter.id, point, index: i };
      });
    });
  });
  return map;
}

function getSectionStats(sectionId) {
  const section = KNOWLEDGE_DATA.find(s => s.id === sectionId);
  let total = 0, mastered = 0, learning = 0, weak = 0;
  section.chapters.forEach(ch => {
    ch.points.forEach((_, i) => {
      total++;
      const status = state.pointStatus[pointId(sectionId, ch.id, i)] || 'none';
      if (status === 'mastered') mastered++;
      else if (status === 'learning') learning++;
      else if (status === 'weak') weak++;
    });
  });
  return { total, mastered, learning, weak, none: total - mastered - learning - weak };
}

function getStreak() {
  const today = new Date();
  let current = 0;
  let longest = 0;
  let running = 0;

  const d = new Date(today);
  while (true) {
    const ds = d.toISOString().slice(0, 10);
    const rec = state.dailyRecords[ds];
    if (rec && rec.hours > 0) { current++; } else { break; }
    d.setDate(d.getDate() - 1);
  }

  const allDates = Object.keys(state.dailyRecords).sort();
  for (let i = 0; i < allDates.length; i++) {
    const rec = state.dailyRecords[allDates[i]];
    if (rec && rec.hours > 0) {
      running++;
      if (running > longest) longest = running;
    } else {
      running = 0;
    }
    if (i > 0) {
      const prev = new Date(allDates[i - 1]);
      const curr = new Date(allDates[i]);
      const diffDays = Math.round((curr - prev) / (1000 * 60 * 60 * 24));
      if (diffDays > 1) running = rec && rec.hours > 0 ? 1 : 0;
    }
  }
  if (running > longest) longest = running;
  return { current, longest };
}

function renderStreakCalendar() {
  const today = new Date();
  let cells = '';
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const rec = state.dailyRecords[ds];
    const hours = rec ? rec.hours : 0;
    let level = 0;
    if (hours > 0 && hours < 1) level = 1;
    else if (hours >= 1 && hours < 2) level = 2;
    else if (hours >= 2 && hours < 4) level = 3;
    else if (hours >= 4) level = 4;
    cells += `<span class="streak-cell streak-l${level}" title="${ds}: ${hours}h"></span>`;
  }
  return `<div class="card">
    <h3>近28天打卡记录</h3>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div class="streak-grid">${cells}</div>

      <span>少</span>

      <span class="streak-cell streak-l4" style="display:inline-block;border-radius:3px"></span>
      <span>多</span>
    </div>
  </div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function highlightMatch(text, query) {
  const escaped = escapeHtml(text);
  const escapedQuery = escapeHtml(query);
  const regex = new RegExp('(' + escapedQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark style="background:#fde68a;color:#92400e;padding:1px 2px;border-radius:2px">$1</mark>');
}

function on808Search(value) {
  currentSearch808 = value;
  refresh();
}

function clear808Search() {
  currentSearch808 = '';
  refresh();
}

function update808PointStatus(pid, status) {
  state.pointStatus808[pid] = status;
  if (status === 'none') delete state.pointStatus808[pid];
  saveState(state);
  const dot = document.querySelector(`.status-dot-wrap[data-pid="${pid}"] .status-dot`);
  if (dot) {
    dot.className = 'status-dot ' + (status === 'mastered' ? 'mastered' : status === 'learning' ? 'learning' : status === 'weak' ? 'weak' : 'none');
  }
}

// 808 plan editing
function togglePlan808() {
  const body = document.getElementById('plan-808-body');
  const arrow = document.getElementById('plan-808-arrow');
  if (body && arrow) {
    const isVisible = body.style.display !== 'none';
    body.style.display = isVisible ? 'none' : 'block';
    arrow.textContent = isVisible ? '▶' : '▼';
  }
}

function editPlan808() {
  document.getElementById('plan-808-view').style.display = 'none';
  document.getElementById('plan-808-edit').style.display = 'block';
  document.getElementById('plan-808-edit-btn').style.display = 'none';
}

function savePlan808() {
  const textarea = document.getElementById('plan-808-textarea');
  state.plan808 = textarea.value;
  saveState(state);
  document.getElementById('plan-808-view').textContent = state.plan808;
  document.getElementById('plan-808-view').style.display = 'block';
  document.getElementById('plan-808-edit').style.display = 'none';
  document.getElementById('plan-808-edit-btn').style.display = 'inline-flex';
}

function cancelEditPlan808() {
  document.getElementById('plan-808-textarea').value = state.plan808;

// ===========================
// RENDER: WRONG QUESTIONS
// ===========================
function renderWrongQuestions() {
  const filterError = new URLSearchParams(window.location.hash.slice(1)).get('errorType') || '';
  let questions = state.wrongQuestions;
  if (filterError) {
    questions = questions.filter(q => q.errorType === filterError);
  }

  // Stats
  const total = state.wrongQuestions.length;
  const unmastered = state.wrongQuestions.filter(q => !q.mastered).length;
  const mastered = total - unmastered;
  const byType = {};
  state.wrongQuestions.forEach(q => {
    byType[q.errorType] = (byType[q.errorType] || 0) + 1;
  });

  let html = `<div class="stats-grid">
    <div class="stat-card danger"><div class="num">${total}</div><div class="label">总错题数</div></div>
    <div class="stat-card warning"><div class="num">${unmastered}</div><div class="label">待攻克</div></div>
    <div class="stat-card success"><div class="num">${mastered}</div><div class="label">已攻克</div></div>
  </div>`;

  // Error type breakdown
  html += `<div class="card">
    <h3>错误类型分布</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${['概念不清','计算错误','审题失误','方法错误'].map(t => {
        const count = byType[t] || 0;
        const pct = total > 0 ? Math.round((count / total) * 100) : 0;
        const active = filterError === t;
        return `<button class="btn ${active ? 'btn-primary' : 'btn-outline'} btn-sm" onclick="filterErrorType('${t}')">
          ${t} <strong>${count}</strong> (${pct}%)
        </button>`;
      }).join('')}
      ${filterError ? `<button class="btn btn-sm" onclick="filterErrorType('')" style="color:var(--text-secondary)">清除筛选</button>` : ''}
    </div>
  </div>`;

  // Wrong questions list
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">错题列表</h3>
      <button class="btn btn-primary btn-sm" onclick="openAddWrongModal()">+ 添加错题</button>
    </div>`;

  if (questions.length === 0) {
    html += `<p style="color:var(--text-secondary);text-align:center;padding:40px">暂无错题记录，开始做题吧！</p>`;
  } else {
    html += `<div class="table-wrap"><table>
      <thead><tr>
        <th>日期</th><th>章节</th><th>知识点</th><th>题目</th><th>错误类型</th><th>难度</th><th>复习次数</th><th>状态</th><th>操作</th>
      </tr></thead><tbody>`;
    questions.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(q => {
      const difficultyStars = '⭐'.repeat(q.difficulty);
      const statusTag = q.mastered ? '<span class="tag tag-green">已攻克</span>' : '<span class="tag tag-yellow">待复习</span>';
      html += `<tr>
        <td>${q.date}</td>
        <td>${q.chapter}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${q.point}">${q.point||'-'}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${q.question}">${q.question}</td>
        <td><span class="tag tag-red">${q.errorType}</span></td>
        <td>${difficultyStars}</td>
        <td>${q.reviewCount || 0}</td>
        <td>${statusTag}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="openEditWrongModal('${q.id}')" style="margin-right:4px">查看</button>
          <button class="btn btn-sm ${q.mastered ? 'btn-outline' : 'btn-primary'}" onclick="toggleWrongMastered('${q.id}')">${q.mastered ? '重新打开' : '已攻克'}</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  html += `</div>`;

  return html;
}

// RENDER: DAILY PLAN
// ===========================
function renderDailyPlan() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayRecord = state.dailyRecords[todayStr] || { hours: 0, chapters: [] };

  // Find weak points from wrong questions
  const weakChapterIds = new Set();
  state.wrongQuestions.filter(q => !q.mastered).forEach(q => {
    weakChapterIds.add(q.chapterId);
  });

  // Find chapters sorted by priority (weak ones first, then unstarted)
  const allChapters = [];
  KNOWLEDGE_DATA.forEach(section => {
    section.chapters.forEach(ch => {
      const cs = getChapterStats(section.id, ch.id);
      const priority = weakChapterIds.has(ch.id) ? 0 : cs.mastered === 0 ? 1 : cs.weak > 0 ? 2 : 3;
      allChapters.push({
        sectionName: section.name, chapterName: ch.name, sectionId: section.id, chapterId: ch.id,
        stats: cs, priority,
        pct: cs.total > 0 ? Math.round((cs.mastered / cs.total) * 100) : 0
      });
    });
  });
  allChapters.sort((a, b) => a.priority - b.priority || a.pct - b.pct);

  let html = '';

  // Settings
  html += `<div class="card">
    <h3>计划设置</h3>
    <div class="form-row">
      <div class="form-group">
        <label>每日目标学习时长（小时）</label>
        <input type="number" id="plan-hours" value="${state.planSettings.dailyHours}" min="1" max="16" step="0.5" onchange="updatePlanSetting('dailyHours', this.value)">
      </div>
      <div class="form-group">
        <label>考试日期</label>
        <input type="date" id="plan-exam-date" value="${state.planSettings.examDate}" onchange="updatePlanSetting('examDate', this.value)">
      </div>
    </div>
  </div>`;

  // Today's plan
  html += `<div class="card">
    <h3>今日学习建议</h3>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">
      根据你的进度和薄弱点，以下是按优先级排列的学习建议：
    </p>`;

  const topChapters = allChapters.filter(c => c.pct < 100).slice(0, 6);
  if (topChapters.length === 0) {
    html += `<p style="color:var(--success);font-weight:500">所有章节已全部掌握，进入刷题阶段吧！</p>`;
  } else {
    html += `<table><thead><tr><th>优先级</th><th>模块</th><th>章节</th><th>当前进度</th><th>建议</th></tr></thead><tbody>`;
    topChapters.forEach((ch, i) => {
      const tag = ch.priority === 0 ? '<span class="tag tag-red">错题相关</span>' :
                  ch.priority === 1 ? '<span class="tag tag-blue">未开始</span>' :
                  ch.priority === 2 ? '<span class="tag tag-yellow">有薄弱点</span>' : '';
      const suggestion = ch.pct === 0 ? '从零开始学习本章' :
                         ch.stats.weak > 0 ? `重点攻克 ${ch.stats.weak} 个薄弱知识点` :
                         `继续推进，剩余 ${ch.stats.none} 个知识点`;
      html += `<tr>
        <td><strong>#${i + 1}</strong></td>
        <td>${ch.sectionName}</td>
        <td>${ch.chapterName}</td>
        <td>${ch.stats.mastered}/${ch.stats.total} (${ch.pct}%)</td>
        <td>${tag} ${suggestion}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  // Study log
  html += `<div class="card">
    <h3>今日学习记录</h3>
    <div class="form-row" style="margin-bottom:12px">
      <div class="form-group">
        <label>学习时长（小时）</label>
        <input type="number" id="today-hours-plan" value="${todayRecord.hours}" min="0" max="24" step="0.5" onchange="updateTodayHours(this.value)">
      </div>
    </div>
    <div class="form-group">
      <label>今日已完成的章节（可多选）</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
        ${allChapters.map(ch => {
          const checked = todayRecord.chapters.includes(ch.chapterId);
          return `<label style="font-size:12px;display:flex;align-items:center;gap:4px;padding:4px 8px;background:#f8fafc;border-radius:4px;cursor:pointer">
            <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleTodayChapter('${ch.chapterId}', this.checked)" style="width:auto">
            ${ch.sectionName}·${ch.chapterName}
          </label>`;
        }).join('')}
      </div>
    </div>
  </div>`;

  return html;
}

// ===========================
// RENDER: VIDEO TRACKER
// ===========================
function renderVideo() {
  // Calculate chapter stats
  const chapters = [];
  const chapterMap = {};
  VIDEO_DATA.forEach((v, i) => {
    if (!chapterMap[v.ch]) {
      chapterMap[v.ch] = { name: v.ch, totalMin: 0, totalVideos: 0, completedVideos: 0, completedMin: 0, videos: [] };
      chapters.push(chapterMap[v.ch]);
    }
    const vid = 'v_' + i;
    const done = state.videoCompleted[vid] || false;
    chapterMap[v.ch].totalMin += v.d;
    chapterMap[v.ch].totalVideos++;
    if (done) {
      chapterMap[v.ch].completedVideos++;
      chapterMap[v.ch].completedMin += v.d;
    }
    chapterMap[v.ch].videos.push({ ...v, id: vid, index: i, done });
  });

  const totalMin = chapters.reduce((s, c) => s + c.totalMin, 0);
  const completedMin = chapters.reduce((s, c) => s + c.completedMin, 0);
  const totalVideos = VIDEO_DATA.length;
  const completedVideos = Object.values(state.videoCompleted).filter(Boolean).length;
  const pct = totalVideos > 0 ? Math.round((completedVideos / totalVideos) * 100) : 0;

  // Estimated days
  const remainingMin = totalMin - completedMin;
  const dailyHours = state.planSettings.dailyHours || 4;
  const estimatedDays = dailyHours > 0 ? Math.ceil(remainingMin / (dailyHours * 60)) : 0;

  let html = '';

  // Overall stats
  html += `<div class="stats-grid">
    <div class="stat-card primary"><div class="num">${pct}%</div><div class="label">视频完成率</div></div>
    <div class="stat-card success"><div class="num">${completedVideos}</div><div class="label">已完成 / ${totalVideos} 个视频</div></div>
    <div class="stat-card warning"><div class="num">${Math.round(completedMin / 60)}h${Math.round(completedMin % 60)}m</div><div class="label">已完成时长 / ${Math.round(totalMin / 60)}h${Math.round(totalMin % 60)}m</div></div>
    <div class="stat-card ${estimatedDays < 14 ? 'danger' : estimatedDays < 25 ? 'warning' : 'success'}"><div class="num">${estimatedDays}</div><div class="label">预计还需 (天)</div></div>
  </div>`;

  // Overall progress bar
  html += `<div class="card">
    <div class="progress-label"><span>总进度</span><span>${pct}% (剩余 ${Math.round(remainingMin / 60)}小时${Math.round(remainingMin % 60)}分)</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill ${pct >= 50 ? 'high' : pct >= 25 ? 'mid' : 'low'}" style="width:${pct}%"></div></div>
    ${remainingMin > 0 ? `<p style="font-size:13px;color:var(--text-secondary);margin-top:8px">按每天${dailyHours}小时计算，还需约 <strong>${estimatedDays}</strong> 天完成全部视频</p>` : ''}
  </div>`;

  // Per-chapter accordion
  html += `<div class="card"><h3>各讲进度</h3>`;

  chapters.forEach(ch => {
    const chPct = ch.totalVideos > 0 ? Math.round((ch.completedVideos / ch.totalVideos) * 100) : 0;
    const barColor = chPct >= 80 ? '#059669' : chPct >= 40 ? '#d97706' : '#dc2626';
    const chId = 'video-ch-' + ch.name.replace(/\s+/g, '_');

    html += `<div class="tree-node" style="margin-bottom:8px">
      <div class="row" onclick="toggleTree(this)" style="background:#f8fafc;border-radius:8px;padding:10px 12px">
        <span class="arrow">▶</span>
        <span style="font-weight:600;flex:1;font-size:14px">${ch.name}</span>
        <span style="font-size:12px;color:var(--text-secondary);margin-right:8px">${ch.completedVideos}/${ch.totalVideos}个</span>
        <span style="font-size:12px;color:var(--text-secondary);margin-right:8px">${Math.round(ch.totalMin)}分钟</span>
        <span style="font-size:13px;font-weight:600;width:36px;text-align:right" class="${chPct >= 80 ? '' : chPct >= 40 ? '' : ''}" style="color:${barColor}">${chPct}%</span>
      </div>
      <div class="children">
        <div style="padding:4px 0 4px 24px">`;

    ch.videos.forEach(v => {
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;font-size:13px;${v.done ? 'background:#f0fdf4' : ''}">
        <input type="checkbox" ${v.done ? 'checked' : ''} onchange="toggleVideo('${v.id}', this.checked)" style="width:auto;cursor:pointer" id="${v.id}">
        <label for="${v.id}" style="flex:1;cursor:pointer;${v.done ? 'color:var(--success);text-decoration:line-through' : ''}" title="${v.c}">${v.c}</label>
        <span style="font-size:12px;color:var(--text-secondary);min-width:70px;text-align:right">${v.ds}</span>
        ${v.c.includes('仅数学一') || v.c.includes('仅数学一、数学二') ? '<span class="tag tag-blue" style="font-size:10px">跳过</span>' : ''}
      </div>`;
    });

    html += `</div></div></div>`;
  });

  html += `</div>`;

  // Quick actions
  html += `<div class="card">
    <h3>快捷操作</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="markChapterVideos('all', true)">全部标为完成</button>
      <button class="btn btn-outline btn-sm" onclick="markChapterVideos('all', false)">全部标为未完成</button>
      <span style="color:var(--text-secondary);font-size:13px;display:flex;align-items:center;margin-left:8px">
        <span class="tag tag-blue" style="font-size:10px;margin-right:4px">跳过</span> = 仅数学一/二的内容，数学三不需要学
      </span>
    </div>
    <p style="font-size:12px;color:var(--text-secondary);margin-top:8px">
      共 <strong>${VIDEO_DATA.filter(v => !v.c.includes('仅数学一') && !v.c.includes('仅数学一、数学二')).length}</strong> 个数学三需要看的视频，
      约 <strong>${Math.round(VIDEO_DATA.filter(v => !v.c.includes('仅数学一') && !v.c.includes('仅数学一、数学二')).reduce((s, v) => s + v.d, 0) / 60)}</strong> 小时
    </p>
  </div>`;

  return html;
}

function toggleVideo(vid, checked) {
  state.videoCompleted[vid] = checked;
  if (!checked) delete state.videoCompleted[vid];
  saveState(state);
  // Update the label style immediately
  const checkbox = document.getElementById(vid);
  if (checkbox) {
    const label = checkbox.nextElementSibling;
    if (label) {
      if (checked) {
        label.style.color = 'var(--success)';
        label.style.textDecoration = 'line-through';
        checkbox.parentElement.style.background = '#f0fdf4';
      } else {
        label.style.color = '';
        label.style.textDecoration = '';
        checkbox.parentElement.style.background = '';
      }
    }
  }
}

function markChapterVideos(chapterName, done) {
  VIDEO_DATA.forEach((v, i) => {
    if (chapterName === 'all' || v.ch === chapterName) {
      const vid = 'v_' + i;
      state.videoCompleted[vid] = done;
      if (!done) delete state.videoCompleted[vid];
    }
  });
  saveState(state);
  refresh();
}

// ===========================
// MODAL: Add/Edit Wrong Question
// ===========================
function openAddWrongModal() {
  const sections = [];
  KNOWLEDGE_DATA.forEach(s => {
    s.chapters.forEach(ch => {
      ch.points.forEach((p, i) => {
        sections.push({ sectionName: s.name, chapterName: ch.name, chapterId: ch.id, pointName: p, pointId: pointId(s.id, ch.id, i) });
      });
    });
  });

  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modal-content').innerHTML = `
    <h3>添加错题</h3>
    <div class="form-group">
      <label>所属章节</label>
      <select id="wq-chapter" onchange="updatePointSelect()">
        ${(() => {
          const seen = new Set();
          let opts = '';
          KNOWLEDGE_DATA.forEach(s => {
            s.chapters.forEach(ch => {
              const key = ch.id;
              if (!seen.has(key)) {
                seen.add(key);
                opts += `<option value="${ch.id}">${s.name} · ${ch.name}</option>`;
              }
            });
          });
          return opts;
        })()}
      </select>
    </div>
    <div class="form-group">
      <label>关联知识点</label>
      <select id="wq-point"><option value="">-- 选择知识点 --</option></select>
    </div>
    <div class="form-group">
      <label>题目内容</label>
      <textarea id="wq-question" placeholder="输入题目内容..."></textarea>
    </div>
    <div class="form-group">
      <label>你的答案</label>
      <textarea id="wq-answer" placeholder="输入你做错的答案..."></textarea>
    </div>
    <div class="form-group">
      <label>正确解法 / 解析</label>
      <textarea id="wq-analysis" placeholder="输入正确解法和分析..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>错误类型</label>
        <select id="wq-error-type">
          <option value="概念不清">概念不清</option>
          <option value="计算错误">计算错误</option>
          <option value="审题失误">审题失误</option>
          <option value="方法错误">方法错误</option>
        </select>
      </div>
      <div class="form-group">
        <label>难度 (1-5)</label>
        <select id="wq-difficulty">
          <option value="1">1 ⭐</option><option value="2">2 ⭐⭐</option>
          <option value="3" selected>3 ⭐⭐⭐</option>
          <option value="4">4 ⭐⭐⭐⭐</option><option value="5">5 ⭐⭐⭐⭐⭐</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveWrongQuestion()">保存</button>
    </div>
  `;
  updatePointSelect();
}

function updatePointSelect() {
  const chapterId = document.getElementById('wq-chapter')?.value;
  const select = document.getElementById('wq-point');
  if (!select) return;
  select.innerHTML = '<option value="">-- 选择知识点 --</option>';
  if (!chapterId) return;
  KNOWLEDGE_DATA.forEach(s => {
    s.chapters.forEach(ch => {
      if (ch.id === chapterId) {
        ch.points.forEach((p, i) => {
          select.innerHTML += `<option value="${pointId(s.id, ch.id, i)}">${p}</option>`;
        });
      }
    });
  });
}

function openEditWrongModal(qid) {
  const q = state.wrongQuestions.find(w => w.id === qid);
  if (!q) return;

  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modal-content').innerHTML = `
    <h3>错题详情</h3>
    <div class="form-group"><label>日期</label><input value="${q.date}" disabled></div>
    <div class="form-group"><label>章节</label><input value="${q.chapter}" disabled></div>
    <div class="form-group"><label>知识点</label><input value="${q.point || '-'}" disabled></div>
    <div class="form-group"><label>题目</label><textarea disabled>${q.question}</textarea></div>
    <div class="form-group"><label>你的答案</label><textarea disabled>${q.answer || ''}</textarea></div>
    <div class="form-group"><label>正确解法/解析</label><textarea disabled>${q.analysis || ''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label>错误类型</label><input value="${q.errorType}" disabled></div>
      <div class="form-group"><label>难度</label><input value="${'⭐'.repeat(q.difficulty)} (${q.difficulty}/5)" disabled></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>复习次数</label><input value="${q.reviewCount || 0}" disabled></div>
      <div class="form-group"><label>状态</label><input value="${q.mastered ? '已攻克' : '待复习'}" disabled></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-danger btn-sm" onclick="deleteWrongQuestion('${q.id}');closeModal()">删除</button>
      <button class="btn btn-outline btn-sm" onclick="reviewWrongQuestion('${q.id}');closeModal()">复习+1</button>
      <button class="btn btn-outline" onclick="closeModal()">关闭</button>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function saveWrongQuestion() {
  const chapterId = document.getElementById('wq-chapter').value;
  const pointIdVal = document.getElementById('wq-point').value;
  const question = document.getElementById('wq-question').value.trim();
  const answer = document.getElementById('wq-answer').value.trim();
  const analysis = document.getElementById('wq-analysis').value.trim();
  const errorType = document.getElementById('wq-error-type').value;
  const difficulty = parseInt(document.getElementById('wq-difficulty').value);

  if (!question) { alert('请输入题目内容'); return; }

  const chapterInfo = POINT_MAP[pointIdVal] || {};
  const q = {
    id: 'wq_' + Date.now(),
    date: new Date().toISOString().slice(0, 10),
    chapterId: chapterId,
    chapter: chapterInfo.chapter || '',
    point: chapterInfo.point || '',
    pointId: pointIdVal || '',
    question, answer, analysis, errorType, difficulty,
    reviewCount: 0, mastered: false
  };

  state.wrongQuestions.push(q);
  saveState(state);
  closeModal();
  refresh();
}

function deleteWrongQuestion(qid) {
  state.wrongQuestions = state.wrongQuestions.filter(q => q.id !== qid);
  saveState(state);
  refresh();
}

function reviewWrongQuestion(qid) {
  const q = state.wrongQuestions.find(w => w.id === qid);
  if (q) { q.reviewCount = (q.reviewCount || 0) + 1; }
  saveState(state);
  refresh();
}

function toggleWrongMastered(qid) {
  const q = state.wrongQuestions.find(w => w.id === qid);
  if (q) { q.mastered = !q.mastered; }
  saveState(state);
  refresh();
}

function filterErrorType(type) {
  window.location.hash = type ? 'errorType=' + type : '';
  refresh();
}

// ===========================
// ACTIONS
// ===========================
function updatePointStatus(pid, status) {
  state.pointStatus[pid] = status;
  if (status === 'none') delete state.pointStatus[pid];
  saveState(state);
  // Update the DOM directly for the status dot
  const dot = document.querySelector(`.status-dot-wrap[data-pid="${pid}"] .status-dot`);
  if (dot) {
    dot.className = 'status-dot ' + (status === 'mastered' ? 'mastered' : status === 'learning' ? 'learning' : status === 'weak' ? 'weak' : 'none');
  }
}

function updateTodayHours(hours) {
  const todayStr = new Date().toISOString().slice(0, 10);
  if (!state.dailyRecords[todayStr]) state.dailyRecords[todayStr] = { hours: 0, chapters: [] };
  state.dailyRecords[todayStr].hours = parseFloat(hours) || 0;
  saveState(state);
}

function toggleTodayChapter(chapterId, checked) {
  const todayStr = new Date().toISOString().slice(0, 10);
  if (!state.dailyRecords[todayStr]) state.dailyRecords[todayStr] = { hours: 0, chapters: [] };
  if (checked) {
    if (!state.dailyRecords[todayStr].chapters.includes(chapterId)) {
      state.dailyRecords[todayStr].chapters.push(chapterId);
    }
  } else {
    state.dailyRecords[todayStr].chapters = state.dailyRecords[todayStr].chapters.filter(c => c !== chapterId);
  }
  saveState(state);
}

function updatePlanSetting(key, value) {
  if (key === 'dailyHours') state.planSettings.dailyHours = parseFloat(value) || 4;
  else if (key === 'examDate') state.planSettings.examDate = value;
  saveState(state);
}

function exportAllData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kaoyan_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importAllData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.pointStatus && !data.wrongQuestions && !data.dailyRecords) {
          alert('文件格式不正确，请选择 kaoyan_backup_*.json');
          return;
        }
        if (confirm('导入将覆盖当前所有数据（进度、错题、打卡记录），确定继续？')) {
          Object.assign(state, data);
          saveState(state);
          refresh();
          alert('数据导入成功！');
        }
      } catch(e) {
        alert('文件损坏或格式不正确');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportProgress() {
  const stats = getOverallStats();
  let text = '=== 考研数学三 进度报告 ===\n\n';
  text += `总体: ${stats.mastered}/${stats.total} 已掌握 (${Math.round(stats.mastered/stats.total*100)}%)\n\n`;
  KNOWLEDGE_DATA.forEach(section => {
    const s = getSectionStats(section.id);
    text += `${section.name} (占${section.weight}%): ${s.mastered}/${s.total}\n`;
    section.chapters.forEach(ch => {
      const cs = getChapterStats(section.id, ch.id);
      text += `  ${ch.name}: ${cs.mastered}/${cs.total}`;
      if (cs.weak > 0) text += ` ⚠薄弱:${cs.weak}`;
      text += '\n';
    });
    text += '\n';
  });
  text += `\n错题总数: ${state.wrongQuestions.length} | 未攻克: ${state.wrongQuestions.filter(q=>!q.mastered).length}`;

  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '考研数学进度_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

// ===========================
// TREE TOGGLE
// ===========================
function toggleTree(row) {
  const arrow = row.querySelector('.arrow');
  const children = row.parentElement.querySelector('.children');
  if (arrow) arrow.classList.toggle('open');
  if (children) children.classList.toggle('open');
}

// ===========================
// TAB SWITCHING
// ===========================
let currentTab = 'dashboard';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabNames = ['dashboard','knowledge','wrong','video','s808','plan'];
  document.querySelectorAll('.tab').forEach((t, i) => { if (tabNames[i] === tab) t.classList.add('active'); });
  refresh();
}

function refresh() {
  const main = document.getElementById('main-content');
  switch (currentTab) {
    case 'dashboard': main.innerHTML = renderDashboard(); break;
    case 'knowledge': main.innerHTML = renderKnowledge(currentSearch); break;
    case 'wrong': main.innerHTML = renderWrongQuestions(); break;
    case 'video': main.innerHTML = renderVideo(); break;
    case 's808': main.innerHTML = render808Knowledge(currentSearch808); break;
    case 'plan': main.innerHTML = renderDailyPlan(); break;
  }
  // Update badge
  const badge = document.getElementById('wrong-count-badge');
  if (badge) {
    const count = state.wrongQuestions.filter(q => !q.mastered).length;
    badge.textContent = count;
    badge.style.display = count > 0 ? 'inline-block' : 'none';
  }
}

// ===========================
// INIT
// ===========================
function init() {
  // Check URL hash for direct tab access
  const hash = window.location.hash.slice(1);
  if (hash === 'wrong') currentTab = 'wrong';
  else if (hash === 'knowledge') currentTab = 'knowledge';
  else if (hash === 'video') currentTab = 'video';
  else if (hash === 's808') currentTab = 's808';
  else if (hash === 'plan') currentTab = 'plan';

  // Activate correct tab
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabNames2 = ['dashboard','knowledge','wrong','video','s808','plan'];
    if (tabNames2[i] === currentTab) t.classList.add('active');
  });

  refresh();
}

function startApp() {
  init();
  // Auto-save on page unload
  window.addEventListener('beforeunload', () => saveState(state));
}

console.log(`错题数: ${state.wrongQuestions.length}`);
console.log('目标: 厦门大学会计学学硕 405+');

// Boot after all functions defined
bootApp();
